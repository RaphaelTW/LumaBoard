[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22.13.0"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "geolocation=(self)"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
